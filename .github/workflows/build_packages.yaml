name: Build Debian packages

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: arm64v8/debian:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            devscripts debhelper dpkg-dev fakeroot gcc pkgconf \
            libasound2-dev

      - name: Update changelog
        run: |
          VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          export DEBFULLNAME="GitHub Actions"
          export DEBEMAIL="actions@github.com"
          dch --newversion "$VERSION" "Release $VERSION"

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Download soundfonts
        run: |
          curl -LO https://geekfunklabs.com/soundfonts_collection.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            soundfonts_collection.tar.gz
