name: Build Debian packages

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:latest

    strategy:
      matrix:
        arch: [arm64, armhf]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            devscripts debhelper dpkg-dev fakeroot gcc pkgconf \
            libasound2-dev
          
          dpkg --add-architecture ${{ matrix.arch }}

          apt-get update
          apt-get install -y \
            crossbuild-essential-${{ matrix.arch }} \
            libc6:${{ matrix.arch }} \
            libasound2t64:${{ matrix.arch }} \
            libasound2-dev:${{ matrix.arch }}

      - name: Update changelog
        run: |
          VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          export DEBFULLNAME="GitHub Actions"
          export DEBEMAIL="actions@github.com"
          dch --newversion "$VERSION" "Release $VERSION"

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b -a${{ matrix.arch }} -Pcross
          mkdir repo
          cp ../*.deb repo/
          cd repo
          dpkg-scanpackages . /dev/null | gzip -9 > Packages.gz

      - name: Download soundfonts
        run: |
          curl -LO https://geekfunklabs.com/soundfonts_collection.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: |
            repo/*
            soundfonts_collection.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            repo/*
            soundfonts_collection.tar.gz
