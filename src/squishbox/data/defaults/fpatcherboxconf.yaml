fluidsettings:
  audio.driver: alsa
  audio.alsa.device: hw:sndrpihifiberry
  audio.period-size: 64
  audio.periods: 3
  midi.autoconnect: 0
  midi.portname: FluidSynth
  player.reset-synth: 0
  synth.audio-groups: 16
  synth.cpu-cores: 4
  synth.gain: 0.6
  synth.ladspa.active: 1
  synth.midi-channels: 16
  synth.polyphony: 128
banks_path: {cfg_dir.parent}/banks
sounds_path: {cfg_dir.parent}/sounds
midi_path: {cfg_dir.parent}/midi
ladspa_path: /usr/lib/ladspa
lastbank_path: {cfg_dir.parent}/banks/testbank.yaml

