fluidsettings:
  audio.driver: alsa
  audio.alsa.device: hw:sndrpihifiberry
  audio.period-size: 64
  audio.periods: 3
  midi.autoconnect: 0
  midi.portname: FluidPatcher
  player.reset-synth: 0
  synth.audio-groups: 16
  synth.cpu-cores: 4
  synth.gain: 0.6
  synth.ladspa.active: 1
  synth.midi-channels: 16
  synth.polyphony: 128
banks_path: ~/SquishBox/banks/fluidpatcher
sounds_path: ~/SquishBox/media/sounds
midi_path: ~/SquishBox/media/midi
ladspa_path: /usr/lib/ladspa

