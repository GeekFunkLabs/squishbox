# v4 hardware overlay
#  purple PCB with 2 through-hole resistors and LED
lcd_regsel: 4
lcd_enable: 17
lcd_data: [9, 11, 5, 6]
controls:
  knob1:
    type: encoder
    pins: [2, 3]
    actions: {left: dec, right: inc}
  knob1_button:
    type: button
    pin: 27
    actions: {tap: select, hold: back}
  foot_left:
    type: button
    pin: 22
    messages: {on: ctrl:16:22:127, off: ctrl:16:22:0}
outputs:
  led_left: {type: binary, pin: 10}

