# v6 hardware overlay
#  green rectangular PCB with sharp corners
lcd_regsel: 2
lcd_enable: 3
lcd_data: [11, 5, 6, 13]
controls:
  knob1:
    type: encoder
    pins: [22, 10]
    actions: {left: dec, right: inc}
  knob1_button:
    type: button
    pin: 9
    actions: {tap: select, hold: back}
  foot_left:
    type: button
    pin: 27
    messages: {on: ctrl:16:22:127, off: ctrl:16:22:0}
outputs:
  led_left: {type: binary, pin: 17}

